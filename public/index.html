<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoHub - ভিডিও আপলোড</title>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-uploader@2.5.0/dist/mux-uploader.min.js"></script>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --primary: #6366f1; --border: #334155; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { font-size: 2rem; margin-bottom: 15px; }
    .btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; margin: 5px; }
    .btn:hover { opacity: 0.9; }
    .card { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
    .hidden { display: none !important; }
    .status { padding: 10px; border-radius: 6px; margin: 10px 0; text-align: center; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .status.success { background: #dcfce7; color: #166534; }
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
    .video-card { background: var(--card); border-radius: 8px; overflow: hidden; }
    video { width: 100%; aspect-ratio: 16/9; background: #000; }
    input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
    mux-uploader { --mux-uploader-border: 2px dashed var(--border); margin: 15px 0; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 VideoHub</h1>
      <button id="theme-toggle" class="btn">🌙 লাইট মোড</button>
      <div id="auth-section">
        <button id="show-login" class="btn">লগইন</button>
        <button id="show-signup" class="btn">সাইনআপ</button>
      </div>
      <div id="user-section" class="hidden">
        <span id="user-email"></span>
        <button id="logout" class="btn">লগআউট</button>
      </div>
    </header>

    <!-- Login Modal -->
    <div id="login-modal" class="card hidden">
      <h2>লগইন</h2>
      <input type="email" id="login-email" placeholder="ইমেইল">
      <input type="password" id="login-pass" placeholder="পাসওয়ার্ড">
      <button id="login-btn" class="btn">লগইন করুন</button>
      <button id="google-login" class="btn" style="background:#db4437">Google দিয়ে লগইন</button>      <div id="login-status"></div>
    </div>

    <!-- Signup Modal -->
    <div id="signup-modal" class="card hidden">
      <h2>নতুন অ্যাকাউন্ট</h2>
      <input type="email" id="signup-email" placeholder="ইমেইল">
      <input type="password" id="signup-pass" placeholder="পাসওয়ার্ড (৬+ অক্ষর)">
      <button id="signup-btn" class="btn">অ্যাকাউন্ট তৈরি</button>
      <div id="signup-status"></div>
    </div>

    <!-- Upload Section (Login Required) -->
    <div id="upload-section" class="card hidden">
      <h2>⬆️ নতুন ভিডিও আপলোড</h2>
      <p>সর্বোচ্চ ৫০০MB • MP4, WebM</p>
      <button id="start-upload" class="btn">আপলোড শুরু</button>
      <mux-uploader id="uploader" hidden></mux-uploader>
      <div id="upload-status"></div>
    </div>

    <!-- Video Grid -->
    <div class="card">
      <h2>📺 ভিডিও সমূহ</h2>
      <div id="video-grid" class="video-grid">
        <p>ভিডিও লোড হচ্ছে...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyDYitOx64K3fc5GMr9kBnsYoOYiqnNOfTA",
      authDomain: "vite-project-76e9b.firebaseapp.com",
      projectId: "vite-project-76e9b",
      storageBucket: "vite-project-76e9b.firebasestorage.app",
      messagingSenderId: "555019678836",
      appId: "1:555019678836:web:51650d0828a98bf9508d21"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    // 🔥 IMPORTANT: Replace with your actual Cloud Function URL after deploy
    const CREATE_UPLOAD_URL = "https://YOUR_REGION-YOUR_PROJECT.cloudfunctions.net/createMuxUpload";

    let currentUser = null;

    // DOM Elements
    const $ = id => document.getElementById(id);
    const themeToggle = $('theme-toggle');
    const authSection = $('auth-section');
    const userSection = $('user-section');
    const userEmail = $('user-email');
    const loginModal = $('login-modal');
    const signupModal = $('signup-modal');
    const uploadSection = $('upload-section');
    const uploader = $('uploader');
    const videoGrid = $('video-grid');

    // Dark/Light Mode
    let darkMode = true;
    themeToggle.onclick = () => {
      darkMode = !darkMode;
      document.body.style.background = darkMode ? 'var(--bg)' : '#f8fafc';
      document.body.style.color = darkMode ? 'var(--text)' : '#1e293b';
      document.querySelectorAll('.card').forEach(c => {
        c.style.background = darkMode ? 'var(--card)' : 'white';
      });
      themeToggle.textContent = darkMode ? '🌙 লাইট মোড' : '☀️ ডার্ক মোড';
    };

    // Auth State
    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        authSection.classList.add('hidden');
        userSection.classList.remove('hidden');
        uploadSection.classList.remove('hidden');
        userEmail.textContent = user.email;
        loginModal.classList.add('hidden');
        signupModal.classList.add('hidden');
      } else {
        authSection.classList.remove('hidden');
        userSection.classList.add('hidden');
        uploadSection.classList.add('hidden');
      }
      loadVideos();
    });

    // Show/Hide Modals
    $('show-login').onclick = () => { loginModal.classList.remove('hidden'); signupModal.classList.add('hidden'); };
    $('show-signup').onclick = () => { signupModal.classList.remove('hidden'); loginModal.classList.add('hidden'); };
    // Login
    $('login-btn').onclick = async () => {
      const email = $('login-email').value;
      const pass = $('login-pass').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        $('login-status').innerHTML = '<div class="status success">✅ লগইন সফল!</div>';
      } catch (err) {
        $('login-status').innerHTML = `<div class="status error">❌ ${err.message}</div>`;
      }
    };

    // Google Login
    $('google-login').onclick = () => {
      signInWithPopup(auth, provider).catch(err => {
        $('login-status').innerHTML = `<div class="status error">❌ ${err.message}</div>`;
      });
    };

    // Signup
    $('signup-btn').onclick = async () => {
      const email = $('signup-email').value;
      const pass = $('signup-pass').value;
      try {
        await createUserWithEmailAndPassword(auth, email, pass);
        $('signup-status').innerHTML = '<div class="status success">✅ অ্যাকাউন্ট তৈরি!</div>';
      } catch (err) {
        $('signup-status').innerHTML = `<div class="status error">❌ ${err.message}</div>`;
      }
    };

    // Logout
    $('logout').onclick = () => signOut(auth);

    // Start Upload
    $('start-upload').onclick = async () => {
      if (!currentUser) {
        alert('প্রথমে লগইন করুন!');
        return;
      }

      try {
        $('upload-status').innerHTML = '<div class="status">🔗 লিংক তৈরি হচ্ছে...</div>';
        const token = await currentUser.getIdToken();
        
        const res = await fetch(CREATE_UPLOAD_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',            'Authorization': `Bearer ${token}`
          }
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        uploader.endpoint = data.url;
        uploader.hidden = false;
        $('upload-status').innerHTML = '<div class="status success">📤 ফাইল সিলেক্ট করুন</div>';

        // Save to Firestore
        await addDoc(collection(db, 'videos'), {
          uploadId: data.id,
          userId: currentUser.uid,
          status: 'uploading',
          createdAt: serverTimestamp(),
          isPublic: true
        });

      } catch (err) {
        $('upload-status').innerHTML = `<div class="status error">❌ ${err.message}</div>`;
      }
    };

    // Upload Success
    uploader?.addEventListener('success', () => {
      $('upload-status').innerHTML = '<div class="status success">✅ আপলোড সফল! প্রসেসিং হচ্ছে...</div>';
    });

    // Load Videos
    function loadVideos() {
      const q = query(collection(db, 'videos'), orderBy('createdAt', 'desc'));
      onSnapshot(q, (snapshot) => {
        videoGrid.innerHTML = '';
        if (snapshot.empty) {
          videoGrid.innerHTML = '<p>কোন ভিডিও নেই</p>';
          return;
        }
        snapshot.forEach(doc => {
          const v = doc.data();
          const card = document.createElement('div');
          card.className = 'video-card';
          if (v.status === 'ready' && v.playbackId) {
            card.innerHTML = `<mux-player playback-id="${v.playbackId}" controls></mux-player>`;
          } else {
            card.innerHTML = `<div style="padding:40px;text-align:center">⏳ ${v.status}</div>`;
          }
          videoGrid.appendChild(card);
        });      });
    }

    // Load Mux Player
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@mux/mux-player@2.5.0/dist/mux-player.min.js';
    document.head.appendChild(script);
  </script>
</body>
</html>
